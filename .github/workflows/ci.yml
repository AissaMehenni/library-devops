name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend-test:
    name: Backend — Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [book-service, member-service]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        working-directory: ./${{ matrix.service }}
        run: chmod +x ./gradlew || true

      - name: Build & run tests
        working-directory: ./${{ matrix.service }}
        run: gradle clean build jacocoTestReport --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/build/reports/tests/
            ${{ matrix.service }}/build/reports/jacoco/

      - name: Verify coverage threshold
        working-directory: ./${{ matrix.service }}
        run: gradle jacocoTestCoverageVerification --no-daemon

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Type-check
        working-directory: ./frontend
        run: npm run lint

      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker-build:
    name: Docker build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    strategy:
      fail-fast: false
      matrix:
        target: [book-service, member-service, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.target }}
          file: ./${{ matrix.target }}/Dockerfile
          push: false
          tags: library/${{ matrix.target }}:ci
