version: "3.9"

services:
  book-service:
    build:
      context: ./book-service
      dockerfile: Dockerfile
    image: library/book-service:latest
    container_name: book-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
    networks:
      - library-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/books"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  member-service:
    build:
      context: ./member-service
      dockerfile: Dockerfile
    image: library/member-service:latest
    container_name: member-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
    networks:
      - library-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/members"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  library-net:
    driver: bridge
